invited:
  - name: Krijn Reijnders
    affiliation: COSIC, KU Leuven, Belgium
    website: 'https://www.krijnreijnders.com/'
    image: assets/krjin.jpeg
    title: 'From Curves To Codes<br>(and back again)'
    title_abstract: 'From Curves To Codes (and back again)'
    abstract: "In this talk, we’ll explore constructions of cryptographic group actions, with a particular focus on code equivalence. We define cryptographic group actions and code equivalence on a high-level, and analyse some of the (advanced) protocols built using code equivalence as a building block. We then take inspiration from isogeny-based cryptography, by comparing existing constructions from both fields. Their intersection leads to interesting questions on the potential of non-commutative cryptographic group actions."
    
  - name: Violetta Weger
    affiliation: Technical University of Munich, Germany
    website: 'https://home.cit.tum.de/~wvi/'
    image: assets/violetta.jpg
    title: 'How hard is code equivalence really?'
    title_abstract: 'How hard is code equivalence really?'
    abstract: "Many isomorphism problems can be naturally formulated as group actions, yet their computational complexity has been puzzling mathematicians for decades. The graph isomorphism problem is the most prominent example, it was given its own complexity class and was long believed to be hard until the breakthrough result of Babai showed that it can be solved in quasi-polynomial time.  In this talk, we turn to a closely related problem: code equivalence. Given two linear codes, can we recover the hidden monomial transformation mapping one to the other? Despite its simple formulation, the true complexity of this problem remains wide open. Beyond its theoretical interest, code equivalence has recently gained attention through its role in post-quantum cryptography, where it underlies the security of the signature scheme LESS.  In this talk, we survey its different variants, discuss connections to graph isomorphism and other related problems, and present an overview of known solvers and their cost, together with several directions that might finally determine how hard code equivalence really is."
    
  - name: Yi-Fu Lai
    affiliation: Shanghai Jiao Tong University, China
    website: 'https://sites.google.com/view/yifulai'
    image: assets/yifu.jpg
    title: 'Wombat: Post-Quantum Blind Signature from Standard Group Action Assumptions and More'
    title_abstract: 'Wombat: Post-Quantum Blind Signature from Standard Group Action Assumptions and More'
    abstract: "A recent work at Asiacrypt 2025 introduced a family of blind signature frameworks, collectively called Tanukis, built on non-commutative cryptographic group actions. These frameworks develop new techniques and achieve concurrent security for blind signatures. Straightforward instantiations yield compact schemes in two paradigms: an isogeny-based instantiation, based on CSI-FiSh group action, with signatures of about 4.5 KB, and a code-based instantiation, based on LESS and the code equivalence group action, with signatures around 64 KB. These are the first efficient blind signature constructions in the isogeny-based and code-based literature that support concurrent executions.\n\nDespite this advance, the Tanuki frameworks rely on a non-standard and interactive assumption, namely the so-called ``one more'' vectorization assumption. Given several structural attacks and vulnerabilities discovered in various group action instantiations, relying on non-standard assumptions can raise concerns.\n\nIn this work we present a new framework that achieves concurrent security while achieving better performance, and relying only on the standard group action hardness assumption, the vectorization problem (also known as the group action inversion problem). For the LESS instantiation, we apply dedicated code-based techniques to reduce signature sizes by a factor of 14.5. These improvements come with rigorous reductions to the standard problem, do not weaken the security claims, and are directly applicable to the LESS instantiations of Tanuki. As a result, our isogeny-based and code-based instantiations yield signature sizes of 8.89 and 8.84 KB, respectively, and retain concurrent security under the standard group-action inversion assumption."        
  
  - name: Lorenz Panny
    affiliation: Technical University of Munich, Germany
    website: 'https://yx7.cc/'
    image: assets/lorenz.jpg
    title: Commutative group actions from isogenies
    title_abstract: Commutative group actions from isogenies
    abstract: "In this introductory presentation I will summarize the concepts underlying isogeny-based commutative group actions, such as CSIDH and its more recent cousins (qt-)PEGASIS, with a non-isogeny-expert audience in mind. If time permits, I will also sketch some of the roadblocks surrounding Kuperberg's algorithm that render a precise and reliable quantum security analysis for those schemes relatively difficult (in comparison to other constructions)."
